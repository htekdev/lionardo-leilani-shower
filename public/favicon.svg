<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Two hearts for twins - blue for boy, pink for girl -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7DD3FC"/>
      <stop offset="100%" style="stop-color:#F9A8D4"/>
    </linearGradient>
  </defs>
  <!-- Left heart (blue - Lionardo) -->
  <path d="M8 12 C8 8, 14 8, 14 12 C14 16, 8 20, 8 20 C8 20, 2 16, 2 12 C2 8, 8 8, 8 12" fill="#7DD3FC"/>
  <!-- Right heart (pink - Leilani) -->
  <path d="M24 12 C24 8, 30 8, 30 12 C30 16, 24 20, 24 20 C24 20, 18 16, 18 12 C18 8, 24 8, 24 12" fill="#F9A8D4"/>
  <!-- Small connecting element -->
  <circle cx="16" cy="14" r="2" fill="url(#grad)"/>
</svg>
